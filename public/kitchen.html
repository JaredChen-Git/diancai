<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🧑‍🍳 厨房订单</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #FF6B6B; --bg: #f8f9fa; --card: #fff; --text: #333; --shadow: 0 2px 12px rgba(0,0,0,0.08); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 0 0 80px;
    }
    .header {
      background: linear-gradient(135deg, var(--primary), #FF8E8E);
      color: #fff;
      padding: 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 20px; }
    .header .badge {
      background: #fff;
      color: var(--primary);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    /* 新订单提醒横幅 */
    .alert-banner {
      display: none;
      background: #4CAF50;
      color: #fff;
      text-align: center;
      padding: 10px;
      font-size: 15px;
      font-weight: 600;
      animation: pulse 1s;
    }
    .alert-banner.show { display: block; }
    @keyframes pulse { 0% { opacity: 0; } 100% { opacity: 1; } }

    .order-list { padding: 12px 16px; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 15px; }

    .order-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--primary);
      animation: slideIn 0.3s;
    }
    .order-card.done {
      border-left-color: #4CAF50;
      opacity: 0.7;
    }
    .order-card.new-order {
      border-left-color: #FF9800;
      animation: newOrder 0.6s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes newOrder {
      0%, 100% { background: var(--card); }
      50% { background: #FFF3E0; }
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .order-time { font-size: 12px; color: var(--text-light); }
    .order-status {
      font-size: 12px; padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .order-status.pending { background: #FFF3E0; color: #FF9800; }
    .order-status.done { background: #E8F5E9; color: #4CAF50; }

    .order-items { margin-bottom: 10px; }
    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 14px;
    }
    .order-note {
      background: #FFFBF0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      border-left: 3px solid #FFC107;
    }
    .order-total {
      text-align: right;
      font-size: 16px;
      font-weight: 600;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }
    .order-total span { color: var(--primary); }
    .order-actions { display: flex; gap: 8px; margin-top: 10px; }
    .order-actions button {
      flex: 1; padding: 8px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-done { background: #4CAF50; color: #fff; }
    .btn-undo { background: #FF9800; color: #fff; }
    .btn-delete { background: #f5f5f5; color: #999; }

    .footer-stats {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      padding: 10px 16px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-around;
      font-size: 13px;
      color: #666;
      z-index: 100;
    }
    .footer-stats span { text-align: center; }
    .footer-stats strong { display: block; font-size: 18px; color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧑‍🍳 厨房订单</h1>
    <div class="badge" id="pendingBadge">待处理: 0</div>
  </div>
  <div class="alert-banner" id="alertBanner">🔔 新订单来了！</div>
  <div class="order-list" id="orderList">
    <div class="empty">
      <div class="icon">🍳</div>
      <p>暂无订单，等着投喂吧~</p>
    </div>
  </div>
  <div class="footer-stats">
    <span>今日订单 <strong id="todayCount">0</strong></span>
    <span>已完成 <strong id="doneCount">0</strong></span>
  </div>

  <script>
    let lastOrderCount = 0;
    let prevIds = new Set();

    async function loadOrders() {
      try {
        const res = await fetch('/api/orders');
        const orders = await res.json();
        renderOrders(orders);
        updateStats(orders);
        checkNewOrder(orders);
      } catch (e) {}
    }

    function renderOrders(orders) {
      const el = document.getElementById('orderList');
      if (orders.length === 0) {
        el.innerHTML = '<div class="empty"><div class="icon">🍳</div><p>暂无订单，等着投喂吧~</p></div>';
        return;
      }
      const nowIds = new Set(orders.map(o => o.id));
      el.innerHTML = orders.map((order, i) => {
        const isNew = order.status === 'pending' && !prevIds.has(order.id);
        return `
          <div class="order-card ${order.status} ${isNew ? 'new-order' : ''}" id="order-${order.id}">
            <div class="order-header">
              <span class="order-time">${new Date(order.createdAt).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}</span>
              <span class="order-status ${order.status}">${order.status === 'pending' ? '⏳ 待做' : '✅ 已完成'}</span>
            </div>
            ${order.note ? `<div class="order-note">📝 ${order.note}</div>` : ''}
            <div class="order-items">
              ${order.items.map(item => `
                <div class="order-item">
                  <span>${item.name} × ${item.count}</span>
                  <span>¥${item.price * item.count}</span>
                </div>
              `).join('')}
            </div>
            <div class="order-total">合计：¥<span>${order.total}</span></div>
            <div class="order-actions">
              ${order.status === 'pending'
                ? `<button class="btn-done" onclick="markDone('${order.id}')">✅ 做好了</button>`
                : `<button class="btn-undo" onclick="markDone('${order.id}')">↩️ 撤回</button>`
              }
              <button class="btn-delete" onclick="deleteOrder('${order.id}')">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
      prevIds = nowIds;
    }

    function checkNewOrder(orders) {
      const pending = orders.filter(o => o.status === 'pending');
      if (pending.length > lastOrderCount && lastOrderCount !== 0) {
        const banner = document.getElementById('alertBanner');
        banner.classList.add('show');
        setTimeout(() => banner.classList.remove('show'), 3000);
        // 播放声音提示
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 800;
          osc.type = 'sine';
          gain.gain.value = 0.3;
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
      }
      lastOrderCount = pending.length;
    }

    function updateStats(orders) {
      const today = new Date().toDateString();
      const todayOrders = orders.filter(o => new Date(o.createdAt).toDateString() === today);
      document.getElementById('todayCount').textContent = todayOrders.length;
      document.getElementById('doneCount').textContent = todayOrders.filter(o => o.status === 'done').length;
      document.getElementById('pendingBadge').textContent = `待处理: ${orders.filter(o => o.status === 'pending').length}`;
    }

    async function markDone(id) {
      await fetch(`/api/orders/${id}`, { method: 'PATCH' });
      loadOrders();
    }

    async function deleteOrder(id) {
      if (!confirm('确定删除此订单？')) return;
      await fetch(`/api/orders/${id}`, { method: 'DELETE' });
      loadOrders();
    }

    // 每 3 秒轮询新订单
    loadOrders();
    setInterval(loadOrders, 3000);
  </script>
</body>
</html>
