<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>❤️ 点菜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF6B6B;
      --primary-dark: #ee5a5a;
      --bg: #f8f9fa;
      --card: #fff;
      --text: #333;
      --text-light: #888;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 80px;
    }
    .header {
      background: linear-gradient(135deg, var(--primary), #FF8E8E);
      color: #fff;
      padding: 20px 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 22px; font-weight: 600; }
    .header p { font-size: 13px; opacity: 0.9; margin-top: 4px; }

    .categories { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; }
    .categories button {
      flex-shrink: 0;
      padding: 8px 18px;
      border: none;
      border-radius: 20px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    .categories button.active {
      background: var(--primary);
      color: #fff;
    }

    .menu-section { padding: 0 16px; }
    .menu-section h2 {
      font-size: 18px;
      margin: 16px 0 10px;
      padding-left: 8px;
      border-left: 3px solid var(--primary);
    }
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card);
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
    }
    .menu-item .info { flex: 1; }
    .menu-item .name { font-size: 16px; font-weight: 500; }
    .menu-item .price { color: var(--primary); font-size: 16px; font-weight: 600; margin-top: 4px; }
    .menu-item .actions { display: flex; align-items: center; gap: 12px; }
    .menu-item .count-btn {
      width: 32px; height: 32px;
      border: none; border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .menu-item .count-btn:disabled { opacity: 0.3; }
    .menu-item .count { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }

    .cart-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      padding: 12px 16px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }
    .cart-info { display: flex; align-items: center; gap: 12px; }
    .cart-badge {
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      width: 28px; height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }
    .cart-total { font-size: 16px; font-weight: 600; }
    .cart-total span { color: var(--primary); }
    .submit-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .submit-btn:disabled { opacity: 0.4; }

    /* 弹窗 */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: 85%;
      max-width: 360px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 18px; margin-bottom: 12px; }
    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px solid #eee;
    }
    .modal-note {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin: 12px 0;
      font-size: 14px;
      resize: none;
    }
    .modal-total { text-align: right; font-size: 16px; font-weight: 600; margin: 8px 0; }
    .modal-total span { color: var(--primary); }
    .modal-actions { display: flex; gap: 10px; margin-top: 12px; }
    .modal-actions button {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .modal-actions .cancel { background: #eee; color: #666; }
    .modal-actions .confirm { background: var(--primary); color: #fff; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #4CAF50; color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 999;
      display: none;
      white-space: nowrap;
    }
    .toast.show { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="header">
    <h1>❤️ 今天想吃啥？</h1>
    <p>选好了就告诉大厨 🧑‍🍳</p>
  </div>
  <div class="categories" id="categories"></div>
  <div class="menu-section" id="menuSection"></div>

  <div class="cart-bar">
    <div class="cart-info">
      <div class="cart-badge" id="cartBadge">0</div>
      <div class="cart-total">¥<span id="cartTotal">0</span></div>
    </div>
    <button class="submit-btn" id="submitBtn" disabled>去下单</button>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>📋 我的点单</h2>
      <div id="cartItems"></div>
      <textarea class="modal-note" id="orderNote" placeholder="口味备注（选填，如：少辣、不要葱）" rows="2"></textarea>
      <div class="modal-total">合计：¥<span id="modalTotal">0</span></div>
      <div class="modal-actions">
        <button class="cancel" onclick="closeModal()">再想想</button>
        <button class="confirm" onclick="submitOrder()">确认下单 ✅</button>
      </div>
    </div>
  </div>

  <script>
    let menu = null;
    let cart = {};  // { itemId: { ...item, count } }
    let activeCategory = '';

    async function loadMenu() {
      const res = await fetch('/api/menu');
      menu = await res.json();
      if (menu.categories.length > 0) activeCategory = menu.categories[0].name;
      renderCategories();
      renderMenu();
    }

    function renderCategories() {
      const el = document.getElementById('categories');
      el.innerHTML = menu.categories.map(c =>
        `<button class="${c.name === activeCategory ? 'active' : ''}" onclick="switchCategory('${c.name}')">${c.name}</button>`
      ).join('');
    }

    function switchCategory(name) {
      activeCategory = name;
      renderCategories();
      renderMenu();
    }

    function renderMenu() {
      const el = document.getElementById('menuSection');
      el.innerHTML = menu.categories.filter(c => c.name === activeCategory).map(c => `
        <h2>${c.name}</h2>
        ${c.items.map(item => {
          const count = cart[item.id]?.count || 0;
          return `
            <div class="menu-item">
              <div class="info">
                <div class="name">${item.name}</div>
                <div class="price">¥${item.price}</div>
              </div>
              <div class="actions">
                <button class="count-btn" ${count === 0 ? 'disabled' : ''} onclick="updateCart('${item.id}', -1)">−</button>
                <span class="count">${count}</span>
                <button class="count-btn" onclick="updateCart('${item.id}', 1)">+</button>
              </div>
            </div>
          `;
        }).join('')}
      `).join('');
    }

    function updateCart(id, delta) {
      const item = menu.categories.flatMap(c => c.items).find(i => i.id === id);
      if (!item) return;
      if (!cart[id]) cart[id] = { ...item, count: 0 };
      cart[id].count += delta;
      if (cart[id].count <= 0) delete cart[id];
      updateUI();
    }

    function updateUI() {
      const total = Object.values(cart).reduce((s, i) => s + i.price * i.count, 0);
      const count = Object.values(cart).reduce((s, i) => s + i.count, 0);
      document.getElementById('cartBadge').textContent = count;
      document.getElementById('cartTotal').textContent = total;
      document.getElementById('submitBtn').disabled = count === 0;
      renderMenu();
    }

    document.getElementById('submitBtn').onclick = () => {
      if (Object.keys(cart).length === 0) return;
      const items = Object.values(cart);
      document.getElementById('cartItems').innerHTML = items.map(i =>
        `<div class="cart-item"><span>${i.name} × ${i.count}</span><span>¥${i.price * i.count}</span></div>`
      ).join('');
      document.getElementById('modalTotal').textContent = items.reduce((s, i) => s + i.price * i.count, 0);
      document.getElementById('modal').classList.add('show');
    };

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function submitOrder() {
      const items = Object.values(cart);
      const note = document.getElementById('orderNote').value;
      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items, note })
        });
        if (res.ok) {
          showToast('✅ 已通知大厨，马上做！❤️');
          cart = {};
          document.getElementById('orderNote').value = '';
          closeModal();
          updateUI();
        } else {
          showToast('❌ 下单失败了，再试一下');
        }
      } catch (e) {
        showToast('❌ 网络出问题了');
      }
    }

    // 点击遮罩关闭弹窗
    document.getElementById('modal').onclick = (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    };

    loadMenu();
  </script>
</body>
</html>
