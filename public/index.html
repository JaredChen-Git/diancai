<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>❤️ 小食堂</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding-bottom: 90px;
    }

    .header {
      background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
      color: #fff;
      padding: 24px 20px 20px;
      text-align: center;
    }
    .header h1 { font-size: 26px; letter-spacing: 2px; }
    .header p { font-size: 14px; opacity: .85; margin-top: 4px; }

    .categories {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      overflow-x: auto;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .categories::-webkit-scrollbar { display: none; }
    .categories button {
      flex-shrink: 0;
      padding: 8px 18px;
      border: 2px solid #eee;
      border-radius: 22px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .categories button.active {
      border-color: var(--cat-color, #FF6B6B);
      background: var(--cat-color, #FF6B6B);
      color: #fff;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px 16px;
    }

    .dish-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      transition: transform .15s;
      position: relative;
    }
    .dish-card:active { transform: scale(.97); }

    .dish-emoji {
      width: 100%;
      aspect-ratio: 16/10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      background: linear-gradient(135deg, var(--cat-bg-from, #fff5f5), var(--cat-bg-to, #fff0f0));
    }

    .dish-body {
      padding: 10px 12px 12px;
    }
    .dish-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }
    .dish-price {
      color: #FF6B6B;
      font-size: 16px;
      font-weight: 700;
      margin-top: 4px;
    }

    .dish-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
    }
    .qty-btn {
      width: 30px; height: 30px;
      border: none; border-radius: 50%;
      background: #FF6B6B;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .qty-btn:active { background: #ee5a5a; }
    .qty-btn.minus:disabled { background: #ddd; }
    .qty-count {
      font-size: 15px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
    }

    .added-badge {
      position: absolute;
      top: 8px; right: 8px;
      background: #4CAF50;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      display: none;
    }
    .added-badge.show { display: block; }

    /* cart bar */
    .cart-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #fff;
      padding: 10px 16px 12px;
      box-shadow: 0 -3px 16px rgba(0,0,0,.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
      border-top: 1px solid #f0f0f0;
    }
    .cart-left { display: flex; align-items: center; gap: 10px; }
    .cart-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #FF6B6B;
      display: flex;
      align-items: center; justify-content: center;
      position: relative;
      font-size: 18px;
    }
    .cart-badge {
      position: absolute;
      top: -4px; right: -4px;
      background: #333;
      color: #fff;
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center; justify-content: center;
    }
    .cart-info { line-height: 1.3; }
    .cart-info .label { font-size: 11px; color: #999; }
    .cart-info .total { font-size: 18px; font-weight: 700; }
    .cart-info .total span { color: #FF6B6B; }

    .submit-btn {
      background: #FF6B6B;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .submit-btn:disabled { background: #ccc; }
    .submit-btn:not(:disabled):active { background: #ee5a5a; }

    /* modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      justify-content: center; align-items: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px;
      width: 88%;
      max-width: 380px;
      max-height: 75vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 18px; margin-bottom: 14px; text-align: center; }
    .modal-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .modal-item .left { display: flex; align-items: center; gap: 8px; }
    .modal-item .left .emoji { font-size: 20px; }
    .modal-item .left .name { font-size: 14px; font-weight: 500; }
    .modal-item .right { font-size: 14px; color: #FF6B6B; font-weight: 600; }
    .modal-item .del-btn {
      background: none; border: none; color: #ccc;
      font-size: 18px; cursor: pointer; padding: 0 4px;
    }
    .modal-note {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      margin: 12px 0;
      font-size: 14px;
      resize: none;
      font-family: inherit;
    }
    .modal-total {
      text-align: right;
      font-size: 18px;
      font-weight: 700;
      padding: 4px 0;
    }
    .modal-total span { color: #FF6B6B; }
    .modal-actions { display: flex; gap: 10px; margin-top: 14px; }
    .modal-actions button {
      flex: 1; padding: 12px;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .modal-actions .cancel { background: #f5f5f5; color: #666; }
    .modal-actions .confirm { background: #FF6B6B; color: #fff; }

    /* toast */
    .toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: #4CAF50; color: #fff;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
    }
    .toast.show { display: block; animation: toastIn .3s; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    @media (min-width: 500px) {
      .menu-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="toast" id="toast"></div>
  <div class="header">
    <h1>❤️ 今天想吃啥？</h1>
    <p>选好了就告诉大厨，马上给你做 🧑‍🍳</p>
  </div>

  <div class="categories" id="categories"></div>
  <div class="menu-grid" id="menuGrid"></div>

  <div class="cart-bar">
    <div class="cart-left" onclick="openModal()">
      <div class="cart-icon">
        🛒
        <div class="cart-badge" id="cartBadge">0</div>
      </div>
      <div class="cart-info">
        <div class="label">购物车</div>
        <div class="total">¥<span id="cartTotal">0</span></div>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" disabled onclick="openModal()">去下单</button>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>📋 我的点单</h2>
      <div id="cartItems"></div>
      <textarea class="modal-note" id="orderNote" placeholder="口味备注（选填）" rows="2"></textarea>
      <div class="modal-total">合计：¥<span id="modalTotal">0</span></div>
      <div class="modal-actions">
        <button class="cancel" onclick="closeModal()">再想想</button>
        <button class="confirm" onclick="submitOrder()">✅ 确认下单</button>
      </div>
    </div>
  </div>

  <script>
    let menu = null, cart = {}, activeCategory = '';

    async function loadMenu() {
      const r = await fetch('/api/menu');
      menu = await r.json();
      if (menu.categories.length) activeCategory = menu.categories[0].name;
      renderCategories();
      renderGrid();
    }

    function renderCategories() {
      const el = document.getElementById('categories');
      el.innerHTML = menu.categories.map(c =>
        `<button style="${c.name === activeCategory ? `--cat-color:${c.color||'#FF6B6B'}`:''}"
          class="${c.name === activeCategory ? 'active':''}"
          onclick="switchCat('${c.name}')">${c.displayName||c.name}</button>`
      ).join('');
    }

    function switchCat(name) {
      activeCategory = name;
      renderCategories();
      renderGrid();
    }

    function renderGrid() {
      const cat = menu.categories.find(c => c.name === activeCategory);
      if (!cat) return;
      const el = document.getElementById('menuGrid');
      el.innerHTML = cat.items.map(item => {
        const c = cart[item.id]?.count || 0;
        return `
          <div class="dish-card" style="--cat-bg-from:${cat.color}15;--cat-bg-to:${cat.color}08">
            <div class="added-badge ${c>0?'show':''}">✓ 已选 ${c}</div>
            <div class="dish-emoji">${item.emoji||'🍽️'}</div>
            <div class="dish-body">
              <div class="dish-name">${item.name}</div>
              <div class="dish-price">¥${item.price}</div>
              <div class="dish-actions">
                <button class="qty-btn minus" ${c===0?'disabled':''} onclick="event.stopPropagation();updateCart('${item.id}',-1)">−</button>
                <span class="qty-count" id="qty-${item.id}">${c}</span>
                <button class="qty-btn" onclick="event.stopPropagation();updateCart('${item.id}',1)">+</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateCart(id, delta) {
      const item = menu.categories.flatMap(c => c.items).find(i => i.id === id);
      if (!item) return;
      if (!cart[id]) cart[id] = { ...item, count: 0 };
      cart[id].count += delta;
      if (cart[id].count <= 0) delete cart[id];
      updateUI();
    }

    function updateUI() {
      const total = Object.values(cart).reduce((s,i) => s + i.price * i.count, 0);
      const count = Object.values(cart).reduce((s,i) => s + i.count, 0);
      document.getElementById('cartBadge').textContent = count;
      document.getElementById('cartTotal').textContent = total;
      document.getElementById('submitBtn').disabled = count === 0;
      renderGrid();
    }

    function openModal() {
      if (Object.keys(cart).length === 0) return;
      renderModal();
      document.getElementById('modal').classList.add('show');
    }

    function renderModal() {
      const items = Object.values(cart);
      document.getElementById('cartItems').innerHTML = items.map(i =>
        `<div class="modal-item">
          <div class="left"><span class="emoji">${i.emoji||'🍽️'}</span><span class="name">${i.name} × ${i.count}</span></div>
          <div class="right">¥${i.price * i.count} <button class="del-btn" onclick="removeFromCart('${i.id}')">✕</button></div>
        </div>`
      ).join('');
      document.getElementById('modalTotal').textContent = items.reduce((s,i) => s + i.price * i.count, 0);
    }

    function removeFromCart(id) {
      delete cart[id];
      updateUI();
      if (Object.keys(cart).length === 0) closeModal();
      else renderModal();
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    async function submitOrder() {
      const items = Object.values(cart);
      const note = document.getElementById('orderNote').value;
      try {
        const r = await fetch('/api/orders', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({items, note})
        });
        if (r.ok) {
          showToast('✅ 已通知大厨，马上给你做！❤️');
          cart = {}; document.getElementById('orderNote').value = '';
          closeModal(); updateUI();
        } else showToast('❌ 下单失败，再试一下');
      } catch(e) { showToast('❌ 网络出问题了'); }
    }

    document.getElementById('modal').onclick = e => { if (e.target === document.getElementById('modal')) closeModal(); };

    loadMenu();
  </script>
</body>
</html>
